name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      SECRET_KEY: ci-secret-key-not-for-production-1234567890-abcdef
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Django system check
        run: python backend/manage.py check
      - name: Migration drift check
        run: python backend/manage.py makemigrations --check --dry-run
      - name: Django deploy check
        env:
          DEBUG: "False"
          SECURE_SSL_REDIRECT: "True"
          SECURE_HSTS_SECONDS: "3600"
        run: python backend/manage.py check --deploy
      - name: Backend tests
        env:
          DEBUG: "True"
          SECURE_SSL_REDIRECT: "False"
        run: python backend/manage.py test accounts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Frontend production build
        run: npm run build
        working-directory: frontend
