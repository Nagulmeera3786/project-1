# ─────────────────────────────────────────────────────────────
# Nginx config for this Django + React project
# Place this file at:  /etc/nginx/sites-available/myapp
# Then run:
#   sudo ln -s /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace YOUR_SERVER_IP or YOUR_DOMAIN with your actual value.
# Replace /path/to/ABC/Project with the real path on your server.
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_SERVER_IP;   # e.g. 192.168.1.50  or  example.com

    # ── Serve React build (static frontend) ──────────────────
    root /path/to/ABC/Project/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ── Proxy API & admin calls to Gunicorn ──────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static/media served by Nginx (faster) ─────────
    location /static/ {
        alias /path/to/ABC/Project/backend/staticfiles/;
    }

    location /media/ {
        alias /path/to/ABC/Project/backend/media/;
    }
}
